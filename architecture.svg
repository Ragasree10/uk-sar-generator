<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">
<!-- Title -->
<title>UK SAR Generator Architecture</title>

<!-- Definitions -->
<defs>
  <!-- Solid arrow -->
  <marker id="arrowSolid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 Z" fill="#000"/>
  </marker>
  
  <!-- Dashed arrow -->
  <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 Z" fill="#666"/>
  </marker>
</defs>

<!-- Main Flow -->

<!-- 1. Alert Input -->
<rect x="250" y="30" width="200" height="60" fill="#fff" stroke="#000" stroke-width="2" rx="4"/>
<text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#000">Alert Input</text>
<text x="350" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">Customer, Account, Amount</text>

<!-- Arrow down -->
<line x1="350" y1="90" x2="350" y2="130" stroke="#000" stroke-width="2" marker-end="url(#arrowSolid)"/>

<!-- 2. Fine-tuned Model -->
<rect x="230" y="130" width="240" height="70" fill="#fff" stroke="#000" stroke-width="2" rx="4"/>
<text x="350" y="155" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#000">Flan-T5-base + LoRA</text>
<text x="350" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">250M params</text>
<text x="350" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">4.2M trainable</text>

<!-- RAG System (Future) - Dashed box on left -->
<rect x="30" y="140" width="160" height="60" fill="#fff" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5" rx="4"/>
<text x="110" y="165" text-anchor="middle" font-family="monospace" font-size="13" fill="#666">RAG System</text>
<text x="110" y="185" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">(Future)</text>

<!-- Dashed arrow from RAG to Model -->
<line x1="190" y1="170" x2="228" y2="170" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowDashed)"/>

<!-- Arrow down from model -->
<line x1="350" y1="200" x2="350" y2="240" stroke="#000" stroke-width="2" marker-end="url(#arrowSolid)"/>

<!-- 3. Generated SAR Draft -->
<rect x="250" y="240" width="200" height="60" fill="#fff" stroke="#000" stroke-width="2" rx="4"/>
<text x="350" y="265" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#000">SAR Draft</text>
<text x="350" y="285" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">Generated Narrative</text>

<!-- Arrow right to Validation -->
<line x1="450" y1="270" x2="490" y2="270" stroke="#000" stroke-width="2" marker-end="url(#arrowSolid)"/>

<!-- 4. Validation Layer (on right) -->
<rect x="490" y="240" width="180" height="60" fill="#fff" stroke="#000" stroke-width="2" rx="4"/>
<text x="580" y="265" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#000">Validation Layer</text>
<text x="580" y="285" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">Hallucination Check</text>

<!-- Arrow down from SAR Draft -->
<line x1="350" y1="300" x2="350" y2="340" stroke="#000" stroke-width="2" marker-end="url(#arrowSolid)"/>

<!-- 5. Review Interface -->
<rect x="230" y="340" width="240" height="70" fill="#fff" stroke="#000" stroke-width="2" rx="4"/>
<text x="350" y="365" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#000">Review Interface</text>
<text x="350" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">SAR + Warnings</text>
<text x="350" y="400" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">Human Review → Submit</text>

<!-- Deployment Context (dotted box around left side) -->
<rect x="20" y="230" width="190" height="90" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,3" rx="4"/>
<text x="115" y="255" text-anchor="middle" font-family="monospace" font-size="12" fill="#666">On-Premise Deploy</text>
<text x="115" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">Bank's GPU Server</text>
<text x="115" y="290" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">No Data Leaves</text>
<text x="115" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#999">GDPR Compliant</text>

<!-- Performance Metrics -->
<rect x="50" y="440" width="600" height="45" fill="#f5f5f5" stroke="#ccc" stroke-width="1" rx="3"/>
<text x="350" y="460" text-anchor="middle" font-family="monospace" font-size="11" fill="#000">Performance: 30 min → 7 min (77% reduction)</text>
<text x="350" y="475" text-anchor="middle" font-family="monospace" font-size="11" fill="#000">Hallucination: 90% rate | Detection: 100% accuracy</text>

</svg>